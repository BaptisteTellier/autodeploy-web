name: build-image
on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      autodeploy_version:
        description: 'Tag/branch of BaptisteTellier/autodeploy to bake in'
        required: false
        default: 'dev'

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve autodeploy version
        id: ad
        run: |
          ver="${{ github.event.inputs.autodeploy_version }}"
          if [ -z "$ver" ]; then
            ver=$(grep -E '^ARG AUTODEPLOY_VERSION=' Dockerfile | head -1 | cut -d= -f2)
          fi
          [ -z "$ver" ] && ver="main"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Build metadata
        id: bmeta
        run: echo "date=$(date -u +%Y-%m-%dT%H:%MZ)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/baptistetellier/autodeploy-web
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Multi-arch: Synology NAS (a deploy host) and others may be arm64, not
          # just x86_64. The runtime stage installs the matching PowerShell build
          # per-arch (see Dockerfile TARGETARCH handling).
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.bmeta.outputs.date }}
            AUTODEPLOY_VERSION=${{ steps.ad.outputs.version }}
          no-cache-filters: fetch
          cache-from: type=gha
          cache-to: type=gha,mode=max
