name: ci
on:
  push:
    branches: [main, master, dev]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Fetch vendored assets
        run: sh scripts/fetch-vendor.sh
      - name: go mod tidy
        run: go mod tidy
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./... -race -count=1
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Files not gofmt-ed:"
            echo "$unformatted"
            gofmt -d .
            exit 1
          fi
